# Publishes static export to GitHub Pages.
# Repo settings → Pages → Build and deployment → Source: GitHub Actions.
# Add secret PROPOSAL_PASSWORD_SHA256: lowercase hex SHA-256 of your chosen password
# (generate locally: node scripts/hash-password.mjs "your-password").

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: /automation-testing-proposal
          NEXT_PUBLIC_PROPOSAL_PASSWORD_SHA256: ${{ secrets.PROPOSAL_PASSWORD_SHA256 }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
